name: D5 Container Security Scan

# AXA Secure SDLC Training - Demo 7, Activities 3 and 4 (Slide 65)
# Builds the Docker image and scans it with Trivy for:
#   - OS-level CVEs in the base image
#   - Misconfigurations (running as root)
# FAILS on the vulnerable Dockerfile, PASSES on the fixed one.
#
# NOTE ON TRIVY: the aquasecurity/trivy-action GitHub Action was compromised
# twice in 2026 (Mar 1 and Mar 19). Rather than use the action, this workflow
# installs the Trivy binary directly from Aqua's official APT repository and
# pins a known-safe version. This is the more defensible choice for a security
# training demo. Safe versions per the official advisory: trivy v0.69.3.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  TRIVY_VERSION: '0.69.3'   # known-safe version per Aqua advisory
  IMAGE_TAG: 'axa-demo:ci'

jobs:

  # ==========================================================================
  # CONTAINER SCAN: build the image, scan with Trivy (CVEs + misconfig)
  # AXA: CLDEV-CFG-01
  # ==========================================================================
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build the Docker image
        run: docker build -t ${{ env.IMAGE_TAG }} .

      - name: Scan Dockerfile for misconfigurations (fail on root user, etc.)
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --quiet \
            .

      - name: Scan image for CVEs (fail on CRITICAL or HIGH)
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --quiet \
            ${{ env.IMAGE_TAG }}

      - name: Scan Dockerfile for misconfigurations (fail on root user, etc.)
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --no-progress \
            .

  # ==========================================================================
  # GATE: single required check. Require ONLY this in branch protection.
  # ==========================================================================
  gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: always()
    steps:
      - name: Check container scan passed
        run: |
          if [ "${{ needs.container-scan.result }}" != "success" ]; then
            echo "Container scan failed. Vulnerabilities or misconfigurations detected."
            echo "Container Scan: ${{ needs.container-scan.result }}"
            exit 1
          fi
          echo "Container scan passed."
