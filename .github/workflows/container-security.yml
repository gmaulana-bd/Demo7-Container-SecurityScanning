name: D5 Container Security Scan

# AXA Secure SDLC Training - Demo 7, Activities 3 and 4 (Slide 65)
# Builds the Docker image and scans it with Trivy for OS CVEs and Dockerfile
# misconfigurations. FAILS on the vulnerable Dockerfile, PASSES on the fixed one.
#
# NOTE ON TRIVY: the aquasecurity/trivy-action and binary releases were
# compromised in Feb-Mar 2026 (the v0.69.x line and the GitHub Actions). This
# workflow installs the binary via the official install script and pins a
# current post-incident version, clear of the compromised range.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  TRIVY_VERSION: '0.71.2'   # current stable, clear of the 0.69.x compromise
  IMAGE_TAG: 'axa-demo:ci'

jobs:

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build the Docker image
        run: docker build -t ${{ env.IMAGE_TAG }} .

      - name: Install Trivy (official install script, pinned current version)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v${{ env.TRIVY_VERSION }}
          trivy --version

      - name: Scan image for CVEs (fail on CRITICAL or HIGH)
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --quiet \
            ${{ env.IMAGE_TAG }}

      - name: Scan Dockerfile for misconfigurations (fail on root user, etc.)
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --quiet \
            .

  gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: always()
    steps:
      - name: Check container scan passed
        run: |
          if [ "${{ needs.container-scan.result }}" != "success" ]; then
            echo "Container scan failed. Vulnerabilities or misconfigurations detected."
            echo "Container Scan: ${{ needs.container-scan.result }}"
            exit 1
          fi
          echo "Container scan passed."